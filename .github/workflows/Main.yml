name: CI/CD Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy source code
      - name: "Checkout code"
        uses: actions/checkout@v4

      # 2. Cài Java
      - name: "Setup JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Build project
      - name: "Build Spring Boot"
        run: ./mvnw clean package -DskipTests

      # 4. Login Docker Hub bằng Secrets
      - name: "Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.dckr_pat_CkFmpW9Kr-4OTOOFaGuIGBKwukg }}

      # 5. Build Docker image
      - name: "Build Docker Image"
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-demo:latest .

      # 6. Push lên Docker Hub
      - name: "Push Docker Image"
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-demo:latest
